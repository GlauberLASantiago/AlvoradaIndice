            background-color: #00111B;

            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #00111B;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #053D47;

            <!-- Filtros de Pasta -->

                <button data-folder="1" class="filter-btn px-3 py-1.5 rounded-md bg-[#00111B] border border-white/10 text-[10px] font-bold uppercase transition-all">P1</button>
                <button data-folder="2" class="filter-btn px-3 py-1.5 rounded-md bg-[#00111B] border border-white/10 text-[10px] font-bold uppercase transition-all">P2</button>
                <button data-folder="3" class="filter-btn px-3 py-1.5 rounded-md bg-[#00111B] border border-white/10 text-[10px] font-bold uppercase transition-all">P3</button>

            </div>
        </div>

        <!-- Resultados -->
        <div class="flex items-center justify-between mb-2 px-2">
            <span id="results-count" class="text-[10px] text-gray-400 font-mono uppercase">Carregando...</span>
            <div class="h-px flex-1 bg-white/5 mx-4"></div>
        </div>

        <div id="index-list" class="space-y-1 max-h-[65vh] overflow-y-auto pr-2 custom-scrollbar">
            <!-- As músicas serão inseridas aqui -->
        </div>

        <!-- Rodapé -->

        const sortedSongs = [...songs].sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));

        const searchInput = document.getElementById('search-input');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const indexList = document.getElementById('index-list');
        const resultsCount = document.getElementById('results-count');

        let currentFolder = 'all';
        let currentSearch = '';

        function render() {
            const filtered = sortedSongs.filter(song => {
                const matchesFolder = currentFolder === 'all' || song.folder.toString() === currentFolder;
                const searchStr = `${song.name} ${song.code}`.toLowerCase();
                const matchesSearch = searchStr.includes(currentSearch.toLowerCase());
                return matchesFolder && matchesSearch;
            });

            indexList.innerHTML = '';
            
            if (filtered.length === 0) {
                indexList.innerHTML = `
                    <div class="text-center py-8 text-gray-500 bg-[#053D47]/20 rounded-xl border border-dashed border-white/5 text-xs">
                        Nenhuma música encontrada.
                    </div>
                `;
            } else {
                filtered.forEach(song => {
                    const card = document.createElement('div');
                    // Reduzi o padding para py-2 e px-3
                    card.className = "song-card bg-[#053D47]/40 border-l-2 border-white/5 py-2 px-3 rounded-r-md transition-all flex items-center justify-between group";
                    card.innerHTML = `
                        <div class="flex-1 min-w-0 pr-4">
                            <h4 class="text-[13px] font-medium truncate group-hover:text-[#75FF31] transition-colors">${song.name}</h4>
                        </div>
                        <div class="text-right">
                            <span class="bg-[#00111B]/50 text-[#FC5E1E] text-[10px] font-mono font-bold px-1.5 py-0.5 rounded border border-[#FC5E1E]/30">
                                ${song.code}
                            </span>
                        </div>
                    `;
                    indexList.appendChild(card);
                });
            }

            resultsCount.textContent = `${filtered.length} músicas`;
        }

        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            render();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active-filter'));
                btn.classList.add('active-filter');
                currentFolder = btn.dataset.folder;
                render();
            });
        });

        window.onload = render;
    </script>
